{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f1f1f1;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .thankyou-box {
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }

    .thankyou-box h1 {
      color: #1a237e;
      margin-bottom: 15px;
    }

    .thankyou-box p {
      font-size: 16px;
      color: #333;
    }

    .thankyou-box a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #1a237e;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 500;
    }

    .thankyou-box a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="thankyou-box">
    <h1>✅ Successfully Submitted!</h1>
    <p>Thank you for completing the batch allotment form.<br>
    A confirmation copy has been sent to your email.</p>

    <a href="../index">Go to Home</a>
  </div>

</body>
</html>
