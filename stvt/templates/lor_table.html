<!DOCTYPE html>
<html>
<head>
    <title>LOR Submissions</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 40px auto;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }
        th {  
           background-color: #007bff;
           color: white;
        }
        img {
            width: 100px;
            height: auto;
        }
    </style>
</head>
<body>
    <h2 style="text-align: center;">LOR Submissions</h2>
    <table>
        <thead>
            <tr>
                <th> S No</th>
                <th>Mobile</th>
                <th>Address</th>
                <th>Uploaded Image</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for lor in lors %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ lor.mobile }}</td>
                <td>{{ lor.address }}</td>
                <td>
                    {% if lor.image %}
                        <img src="{{ lor.image.url }}" alt="LOR Image">
                    {% else %}
                        No image
                    {% endif %}
                </td>
                <td>
          
                 <a href="{% url 'delete_lor' lor.id %}">🗑️ Delete</a>
             </td>
            </tr>
            
            
       {% empty %}
     <tr><td colspan="6">No students found.</td></tr>
      {% endfor %}
        </tbody>
    </table>
</body>
</html>
