{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Letter - STC</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #e3f2fd;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      min-height: 100vh;
    }
    .form-box {
      background-color: #fff;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 550px;
    }
    label {
      font-weight: bold;
      display: block;
      margin: 12px 0 5px;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 15px;
    }
    input[type="submit"] {
      background-color: #1a237e;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #3949ab;
    }
    .form-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #1a237e;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Training Letter</h2>

    <form id="trainingForm" method="POST">
      {% csrf_token %}
      
      <!-- Project Date -->
      <label for="date">Project Date</label>
      <select id="date" name="date" required>
        <option value="">Choose</option>
        <option value="02-06-2025">02-06-2025</option>
        <option value="09-06-2025">09-06-2025</option>
        <option value="16-06-2025">16-06-2025</option>
        <option value="23-06-2025">23-06-2025</option>
        <option value="30-06-2025">30-06-2025</option>
        <option value="07-07-2025">07-07-2025</option>
      </select>

      <!-- Duration -->
      <label for="duration">Please select the duration of your training</label>
      <select id="duration" name="duration" required>
        <option value="">Choose</option>
        <option value="4 weeks">4 weeks</option>
        <option value="6 weeks">6 weeks</option>
      </select>

      <!-- Project (dynamic) -->
      <label for="project"><b>Please select the project</b></label>
      <select id="project" name="project" required>
        <option value="">Choose</option>
      </select>

      <input type="submit" value="Generate Letter"/>
    </form>
  </div>

  <script>
    const trainingForm = document.getElementById("trainingForm");
    const durationSelect = document.getElementById("duration");
    const projectSelect = document.getElementById("project");

    const projectTitles = {
      "4 weeks": [
        "Microsoft used in Electric Lokomotives, its Periodic Overhauling & Testing",
        "Software for the Service Record of Employees",
        "Data Feeding of Salary of Employees",      
        "Development of Face Identification Software and its implementation"
      ],
      "6 weeks": [
        "Software for the Service Record of Employees and Data Feeding of Salary of Employees",
        "Software Development for Data Keeping of STC(Joining,Feedback,Training and Exam & Marks etc.)"
      ]
    };

    function updateProjects(duration) {
      projectSelect.innerHTML = '<option value="">Choose</option>';
      if (projectTitles[duration]) {
        projectTitles[duration].forEach(project => {
          const opt = document.createElement("option");
          opt.value = project;
          opt.textContent = project;
          projectSelect.appendChild(opt);
        });
      }
    }

    // ✅ Update project list when duration changes
    durationSelect.addEventListener("change", function () {
      updateProjects(durationSelect.value);
    });

    // ✅ No localStorage used anywhere now
  </script>
</body>
</html>
