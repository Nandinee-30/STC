{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center px-4 py-8">
  
  <!-- Profile Card -->
  <div class="bg-white shadow-lg rounded-xl p-8 max-w-4xl w-full flex flex-col md:flex-row items-center space-y-8 md:space-y-0 md:space-x-12">
    
    <!-- Photo -->
    <div class="order-1 md:order-2">
      {% if entry.photo.url %}
        <img src="{{ entry.photo.url }}" alt="Student Photo" class="w-48 h-48 object-cover rounded-full border-4 border-blue-400 shadow-md">
      {% else %}
        <div class="w-48 h-48 flex items-center justify-center bg-gray-200 rounded-full text-gray-500 text-xl">
          No Photo
        </div>
      {% endif %}
    </div>

    <!-- Student Details -->
    <div class="order-2 md:order-1 text-gray-700 space-y-3 w-full">
      <h1 class="text-3xl font-bold text-blue-600 mb-4">Student Profile</h1>
      <p><span class="font-bold">Name:</span> {{ student.name }}</p>
      <p><span class="font-bold">Roll No:</span> {{ student.rollno }}</p>
      <p><span class="font-bold">Email:</span> {{ student.email }}</p>
      <p><span class="font-bold">Mobile:</span> {{ student.mobile }}</p>
      <p><span class="font-bold">Course:</span> {{ student.course }}</p>
    </div>
  </div>

  <!-- Back to Dashboard Button -->
  <div class="mt-8">
    <a href="{% url 'student_dashboard' %}" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-6 py-3 rounded-md shadow-md transition">
      ⬅️ Back to Dashboard
    </a>
  </div>

</body>
</html>
