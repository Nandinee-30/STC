{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Batch Allotment Form - STC</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #e3f2fd;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      min-height: 100vh;
    }

    .form-box {
      background-color: #fff;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 550px;
    }

    h2 {
      text-align: center;
      color: #1a237e;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 12px 0 5px;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    textarea {
      resize: vertical;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: -5px;
      margin-bottom: 10px;
    }

    input[type="submit"] {
      background-color: #1a237e;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    input[type="submit"]:hover {
      background-color: #3949ab;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>Batch Allotment Form</h2>

    <form id="batchForm" action="../batch_allot1/" method="post">
      {% csrf_token %}
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Please enter your email" required>

      <label for="uid">Unique ID Number</label>
      <select id="uid" name="uid" required>
        <option value="">Choose</option>
      </select>
      <script>
  // Dynamically populate 1 to 100 IDs
  window.addEventListener("DOMContentLoaded", () => {
    const dropdown = document.getElementById("uid");

    for (let i = 1; i <= 500; i++) {
      const option = document.createElement("option");
      const idNumber = String(i).padStart(3, '0');  // 001, 002...
      const value = `STVT25/${idNumber}`;
      option.value = value;
      option.textContent = value;
      dropdown.appendChild(option);
    }

    // Restore previous value from localStorage (if needed)
    const saved = localStorage.getItem("uid");
    if (saved) dropdown.value = saved;
  });
</script>


      <label for="receipt">Fee Receipt Number</label>
      <input type="text" id="receipt" name="receipt" placeholder="As per receipt/ticket" required>
      <div class="note">This number is from receipt/ticket you get from station ticket counter.</div>

      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="father">Father's Name</label>
      <input type="text" id="father" name="father" placeholder="Enter your father's name" required>

      <label for="college">College Name</label>
      <input type="text" id="college" name="college" placeholder="Enter your college" required>

      <label for="mobile">Mobile Number</label>
      <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="Enter your mobile number" required>

      <label for="address">Address with Pin Code</label>
      <textarea id="address" name="address" rows="2" placeholder="Enter your full address" required></textarea>

      <input type="submit" value="Next">

    </form>
  </div>

</body>


</html>
