<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - STC Summer Training</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: #f5f5f5;
    }

    .container {
      display: flex;
      width: 100%;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #007bff;
      color: #fff;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 22px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 12px 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .sidebar ul li:hover {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
    }

    /* Main Panel */
    .main {
      flex: 1;
      padding: 20px;
      background: #fff;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
    }

    .logout-btn {
      background: white;
      color: #007bff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Stats Cards */
    .stats {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      flex: 1;
      padding: 20px;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    .card span {
      display: block;
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .blue { background: #007bff; }
    .green { background: #28a745; }
    .yellow { background: #ffc107; color: black; }
    .orange { background: #fd7e14; }

    /* Recent Activity */
    .activity h2 {
      margin-bottom: 10px;
    }

    .activity input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fefefe;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>STC Admin</h2>
      <nav>
        <ul>
          <li style="font-size: 15px; padding: 8px 0;">👤
            <a href="{% url 'admin_panel' %}" style="color: white; text-decoration: none;">Dashboard</a></li>
          <li style="font-size: 15px; padding: 8px 0;">📝
            <a href="{% url 'registered_students' %}" style="color: white; text-decoration: none;">Registered Students</a></li>
          <li style="font-size: 15px; padding: 8px 0;">📜
            <a href="{% url 'lor_table' %}" style="color: white; text-decoration: none;">LOR Submitation</a></li>

          <li style="font-size: 15px; padding: 8px 0;">💰
            <a href="{% url 'fees_challan_table' %}" style="color: white; text-decoration: none;">Manage Fees</a></li>
          <li style="font-size: 15px; padding: 8px 0;">📅 
            <a href="{% url 'batch_allot_table' %}" style="color: white; text-decoration: none;">Manage Batches</a></li>          
            <li style="font-size: 15px; padding: 8px 0;">📜
            <a href="{% url 'training_letter' %}" style="color: white; text-decoration: none;">Training Letter</a></li>       
            <li style="font-size: 15px; padding: 8px 0;">📞 
            <a href="{% url 'contact_table' %}" style="color: white; text-decoration: none;">Contact</a></li>
          <li> 🚪<a href="{% url 'admin_logout' %}" style="color:white"> Logout</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Panel -->
    <main class="main">
      <header class="header">
        <h1>Admin Panel - STC Summer Training</h1>
        <form method="POST" action="{% url 'admin_logout' %}">
           {% csrf_token %}
           <button class="logout-btn">Logout</button>
        </form>
      </header>
<!--
      <section class="stats">
        <div class="card blue">Total Students<br><span>0</span></div>
        <div class="card green">Total Batches<br><span>0</span></div>
        <div class="card yellow">Active Trainings<br><span>0</span></div>
        <div class="card orange">Reports Generated<br><span>0</span></div>
      </section>

      <section class="activity">
        <h2>Recent Activity</h2>
        <input type="text" placeholder="Search" />
        
      </section>-->
    </main>
  </div>
</body>
</html>
