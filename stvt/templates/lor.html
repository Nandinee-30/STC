{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOR Submission - STC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e3f2fd;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px;
    }

    .form-box {
      background-color: #fff;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h2 {
      text-align: center;
      color: #1a237e;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 12px 0 5px;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    input[type="file"] {
      padding: 6px;
    }

    textarea {
      resize: vertical;
    }

    input[type="submit"] {
      background-color: #1a237e;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    input[type="submit"]:hover {
      background-color: #3949ab;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      margin-top: 15px;
      color: #666;
    }

    .success-msg {
      background-color: #d0f8ce;
      color: #2e7d32;
      padding: 10px 15px;
      border-radius: 5px;
      text-align: center;
      font-size: 15px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>Letter of Recommendation</h2>
    
    <div class="success-msg" id="successMsg">✅ Your Letter of Recommendation has been submitted!</div>
    
    <form id="lorForm" enctype="multipart/form-data" method="POST">
       {% csrf_token %}

      <label for="mobile">Mobile No</label>
      <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="Enter your mobile number" required />

      <label for="address">Local Address with Pin Code</label>
      <textarea id="address" name="address" rows="4" placeholder="Enter your address" required></textarea>

      <label for="image">Upload Letter of Recommendation</label>
      <input type="file" id="image" name="image" accept="image/*" required />
    
      <input type="submit" value="Submit" />
    </form>
  </div>

  <script>
    const form = document.getElementById("lorForm");
    const imageInput = document.getElementById("image");
    const successMsg = document.getElementById("successMsg");

    // Show message if previously submitted
    if (localStorage.getItem("lor_submitted") === "true") {
      successMsg.style.display = "block";
      localStorage.removeItem("lor_submitted");
    }

    form.addEventListener("submit", function (e) {
     // e.preventDefault();

      const file = imageInput.files[0];

      if (!file) {
        alert("Please upload your Letter of Recommendation.");
        return;
      }

      if (file.size > 1048576) { // 1MB
        alert("❌ File size must be less than 1MB.");
        return;
      }

      // Save flag to show success message after reload
      localStorage.setItem("lor_submitted", "true");
      location.reload();
    });
  </script>

</body>
</html>
